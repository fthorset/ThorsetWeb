<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kommer snart – ThorsetWeb</title>
  <meta name="description" content="ThorsetWeb lanseres snart. Vi bygger nettsider som gir resultater for norske bedrifter.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0A0A0F;
      --dark:         #0E0E16;
      --surface:      #14141F;
      --card:         #181825;
      --border:       #1E1E2E;
      --accent:       #4F8EF7;
      --accent-light: #7EB3FF;
      --accent-dim:   #1E3A6E;
      --white:        #F0F0FA;
      --text:         #C8C8D8;
      --text-muted:   #7878A8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* ── Bakgrunn ── */
    .bg-effects {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,142,247,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(79,142,247,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 90%, rgba(126,179,255,0.05) 0%, transparent 55%);
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 80%);
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: orb-drift 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 320px; height: 320px;
      background: rgba(79,142,247,0.07);
      top: 15%; left: 10%;
      animation-duration: 14s;
    }
    .orb-2 {
      width: 240px; height: 240px;
      background: rgba(126,179,255,0.05);
      top: 55%; right: 12%;
      animation-duration: 18s;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 180px; height: 180px;
      background: rgba(79,142,247,0.06);
      bottom: 20%; left: 30%;
      animation-duration: 10s;
      animation-delay: -3s;
    }

    @keyframes orb-drift {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(30px, -20px); }
      66%       { transform: translate(-20px, 25px); }
    }

    /* ── Hoved-layout ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo-wrap img {
      height: 320px;
      width: auto;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 24px rgba(79,142,247,0.15));
    }

    /* ── Label ── */
    .label {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
      padding: 0.35rem 1rem;
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: 100px;
      background: rgba(79,142,247,0.07);
    }

    /* ── Heading ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    h1 .dim { color: var(--text-muted); font-weight: 300; }
    h1 .accent { color: var(--accent); }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 1.5rem;
      border-radius: 2px;
    }

    /* ── Beskrivelse ── */
    .desc {
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      color: var(--text);
      line-height: 1.75;
      max-width: 480px;
      margin-bottom: 1.8rem;
      font-weight: 400;
    }

    /* ── Knapp ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.95rem 2.2rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.22s, transform 0.22s, box-shadow 0.22s;
      margin-bottom: 1.4rem;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 24px rgba(79,142,247,0.28);
    }

    .btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,142,247,0.38);
    }

    .btn svg { flex-shrink: 0; }

    /* ── E-post-tekst ── */
    .email-text {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .email-text a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .email-text a:hover { color: var(--accent-light); }

    /* ── Footer-linje ── */
    .footer-line {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.5;
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.06em;
    }

    /* ── Fade-in-up animasjon ── */
    .fi {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .fi.in { opacity: 1; transform: none; }
    .fi-d1 { transition-delay: 0.1s; }
    .fi-d2 { transition-delay: 0.2s; }
    .fi-d3 { transition-delay: 0.3s; }
    .fi-d4 { transition-delay: 0.4s; }
    .fi-d5 { transition-delay: 0.5s; }

    /* Unngå blink på logo-wrap som ikke bruker .fi */
    .logo-wrap { opacity: 0; animation: logo-appear 0.8s ease 0.05s forwards; }
    @keyframes logo-appear {
      to { opacity: 1; }
    }

    /* ── Mobil ── */
    @media (max-width: 480px) {
      .logo-wrap img { height: 140px; }
      .logo-ring { inset: -14px; }
      .logo-ring-outer { inset: -24px; }
    }
  </style>
</head>
<body>

  <!-- Bakgrunnseffekter -->
  <div class="bg-effects" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main>
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="Logo3.png" alt="ThorsetWeb">
    </div>

    <!-- Label -->
    <span class="label fi">Kommer snart</span>

    <!-- Divider -->
    <div class="divider fi fi-d1"></div>

    <!-- Beskrivelse -->
    <p class="desc fi fi-d2">
      Vi jobber med noe spennende. Nettsiden lanseres snart&nbsp;–
      ta gjerne kontakt hvis du har spørsmål i mellomtiden.
    </p>

    <!-- Kontakt-knapp -->
    <a href="mailto:fredrik.thorset@gmail.com" class="btn fi fi-d3" aria-label="Send e-post til ThorsetWeb">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      Send oss en e-post
    </a>

    <!-- Footer-signatur -->
    <p class="footer-line">© 2025 ThorsetWeb</p>
  </main>

  <script>
    // Fade-in-up ved innlasting
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fi').forEach(el => observer.observe(el));
  </script>

</body>
</html>
